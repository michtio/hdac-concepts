<!doctype html>
<!--
  Hypnosis - HET NETWERK (living subway system as SVG)
  A dense, hand-authored transit map: dance-style lines weaving with Vignelli
  geometry, interchange hubs, circle/diamond/interchange stations with labels,
  and clean trains running the lines. Native, no libraries. Ideation.
-->
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hypnosis - Het Netwerk</title>
<style>
  :root{
    --ink:#0a0a0b; --paper:#f5f5f4;
    --U:#fdd630; --D:#943f90; --M:#374b9a; --J:#00933c; --B:#ec6427;
    --C:#c73f90; --G:#70b747; --T:#996633; --K:#a7a9ab; --F:#e73730; --Mu:#00add0;
    --pad:clamp(1.25rem,4vw,4rem);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--ink);color:var(--paper);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
  .wrap{padding:clamp(1.5rem,4vw,3.5rem) var(--pad) 4rem}
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap;margin-bottom:1.6rem}
  .title h1{font-weight:700;text-transform:uppercase;letter-spacing:-.035em;line-height:.9;font-size:clamp(2.4rem,6vw,5.5rem)}
  .title p{color:#b9b9b6;font-size:clamp(1rem,1.4vw,1.25rem);margin-top:.7rem;max-width:46ch}
  .legend{display:flex;gap:1.4rem;flex-wrap:wrap;align-items:center;font-size:.8rem;color:#cfcfcc}
  .legend .it{display:inline-flex;align-items:center;gap:.5rem}
  .legend .dot{width:15px;height:15px;border-radius:50%;background:var(--ink);border:3px solid #fff}
  .legend .dot.d{border-radius:2px;transform:rotate(45deg)}
  .legend .dot.ix{width:26px;height:15px;border-radius:8px;background:#fff;border:none}
  .mapbox{position:relative;width:100%;border-radius:6px;overflow:hidden;background:radial-gradient(120% 120% at 30% 20%, #141417 0%, #0a0a0b 70%)}
  svg.map{display:block;width:100%;height:auto}
  .line{fill:none;stroke-linejoin:round;stroke-linecap:round;stroke-width:11}
  .train{fill:none;stroke:#fff;stroke-linecap:round;stroke-width:7;filter:drop-shadow(0 0 2px rgba(255,255,255,.6))}
  .st{fill:var(--ink);stroke:#fff;stroke-width:4}
  .ix{fill:#fff}
  .blt{stroke:none}
  .lbl{fill:#fff;font-weight:700;font-size:15px;letter-spacing:.02em}
  .lbl.sm{fill:#c7c7c4;font-weight:500;font-size:12.5px;text-transform:uppercase;letter-spacing:.08em}
  .bltxt{fill:#fff;font-weight:600;font-size:15px;text-anchor:middle;dominant-baseline:central}
  .bltxt.dk{fill:#000}
  @media (prefers-reduced-motion: reduce){ .train{display:none} }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">
      <h1>Het netwerk</h1>
      <p>Elke dansstijl is een lijn. Elke les een halte. Jouw groei is een route van kleuter tot wereldtop.</p>
    </div>
    <div class="legend">
      <span class="it"><span class="dot"></span> Local &middot; Fun</span>
      <span class="it"><span class="dot d"></span> Express &middot; Challenge</span>
      <span class="it"><span class="dot ix"></span> Overstap</span>
    </div>
  </div>

  <div class="mapbox">
    <svg class="map" viewBox="0 0 1440 820" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Het Hypnosis netwerk als metrokaart">
      <g class="lines">
        <path id="lnJ" class="line" style="stroke:var(--J)" d="M 120 170 L 430 170 L 520 260 L 520 620 L 610 710 L 1010 710"/>
        <path id="lnU" class="line" style="stroke:var(--U)" d="M 140 300 L 610 300 L 700 390 L 1000 390 L 1090 300 L 1320 300"/>
        <path id="lnM" class="line" style="stroke:var(--M)" d="M 120 470 L 560 470 L 650 560 L 1120 560 L 1210 470 L 1330 470"/>
        <path id="lnD" class="line" style="stroke:var(--D)" d="M 250 730 L 250 470 L 360 360 L 940 360 L 1030 270 L 1030 110"/>
        <path id="lnF" class="line" style="stroke:var(--F)" d="M 1330 140 L 880 140 L 800 220 L 800 470 L 720 550 L 380 550"/>
      </g>

      <g class="trains">
        <path class="train" data-line="lnJ" style="stroke:#fff"/>
        <path class="train" data-line="lnU" style="stroke:#fff"/>
        <path class="train" data-line="lnM" style="stroke:#fff"/>
        <path class="train" data-line="lnD" style="stroke:#fff"/>
        <path class="train" data-line="lnF" style="stroke:#fff"/>
      </g>

      <!-- interchange hubs (white capsules) -->
      <g class="interchanges">
        <rect class="ix" x="500" y="282" width="40" height="120" rx="20" transform="rotate(0 520 342)"/>
        <rect class="ix" x="630" y="342" width="120" height="40" rx="20"/>  <!-- BASECAMP hub area -->
        <rect class="ix" x="780" y="450" width="40" height="120" rx="20"/>
      </g>

      <!-- stations -->
      <g class="stations">
        <!-- J line -->
        <circle class="st" cx="430" cy="170" r="9"/>
        <circle class="st" cx="520" cy="450" r="9"/>
        <rect class="st" x="511" y="611" width="18" height="18" rx="2" transform="rotate(45 520 620)"/>
        <circle class="st" cx="820" cy="710" r="9"/>
        <!-- U line -->
        <circle class="st" cx="380" cy="300" r="9"/>
        <circle class="st" cx="850" cy="390" r="9"/>
        <circle class="st" cx="1200" cy="300" r="9"/>
        <!-- M line -->
        <circle class="st" cx="360" cy="470" r="9"/>
        <circle class="st" cx="900" cy="560" r="9"/>
        <circle class="st" cx="1270" cy="470" r="9"/>
        <!-- D line -->
        <circle class="st" cx="250" cy="600" r="9"/>
        <rect class="st" x="631" y="351" width="18" height="18" rx="2" transform="rotate(45 640 360)"/>
        <circle class="st" cx="1030" cy="180" r="9"/>
        <!-- F express line (diamonds) -->
        <rect class="st" x="1091" y="131" width="18" height="18" rx="2" transform="rotate(45 1100 140)"/>
        <rect class="st" x="791" y="331" width="18" height="18" rx="2" transform="rotate(45 800 340)"/>
        <rect class="st" x="551" y="541" width="18" height="18" rx="2" transform="rotate(45 560 550)"/>
      </g>

      <!-- terminal bullets + labels -->
      <g class="labels">
        <!-- BASECAMP central -->
        <text class="lbl" x="690" y="330" text-anchor="middle">BASECAMP</text>

        <!-- J left terminal -->
        <circle class="blt" cx="120" cy="170" r="17" style="fill:var(--J)"/>
        <text class="bltxt" x="120" y="170">J</text>
        <text class="lbl sm" x="120" y="140" text-anchor="middle">Jazz</text>
        <!-- J right terminal -->
        <circle class="blt" cx="1010" cy="710" r="17" style="fill:var(--J)"/>
        <text class="bltxt" x="1010" y="710">J</text>

        <!-- U left terminal -->
        <circle class="blt" cx="140" cy="300" r="17" style="fill:var(--U)"/>
        <text class="bltxt dk" x="140" y="300">U</text>
        <text class="lbl sm" x="140" y="270" text-anchor="middle">Urban</text>
        <!-- U right terminal -->
        <circle class="blt" cx="1320" cy="300" r="17" style="fill:var(--U)"/>
        <text class="bltxt dk" x="1320" y="300">U</text>

        <!-- M left terminal -->
        <circle class="blt" cx="120" cy="470" r="17" style="fill:var(--M)"/>
        <text class="bltxt" x="120" y="470">M</text>
        <text class="lbl sm" x="120" y="440" text-anchor="middle">Modern</text>
        <!-- M right terminal -->
        <circle class="blt" cx="1330" cy="470" r="17" style="fill:var(--M)"/>
        <text class="bltxt" x="1330" y="470">M</text>

        <!-- D terminals -->
        <circle class="blt" cx="250" cy="730" r="17" style="fill:var(--D)"/>
        <text class="bltxt" x="250" y="730">D</text>
        <text class="lbl sm" x="250" y="762" text-anchor="middle">Disco</text>
        <circle class="blt" cx="1030" cy="110" r="17" style="fill:var(--D)"/>
        <text class="bltxt" x="1030" y="110">D</text>

        <!-- F terminals -->
        <circle class="blt" cx="1330" cy="140" r="17" style="fill:var(--F)"/>
        <text class="bltxt" x="1330" y="140">F</text>
        <text class="lbl sm" x="1330" y="110" text-anchor="middle">Fitness</text>
        <circle class="blt" cx="380" cy="550" r="17" style="fill:var(--F)"/>
        <text class="bltxt" x="380" y="550">F</text>

        <!-- milestone labels -->
        <text class="lbl sm" x="820" y="742" text-anchor="middle">Kleuter</text>
        <text class="lbl sm" x="1270" y="502" text-anchor="middle">Wereldtop</text>
      </g>
    </svg>
  </div>
</div>

<script>
(() => {
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const trains = [...document.querySelectorAll('.train')];
  trains.forEach((tr, i) => {
    const src = document.getElementById(tr.dataset.line);
    tr.setAttribute('d', src.getAttribute('d'));
    const len = tr.getTotalLength();
    const seg = 30;
    tr.style.strokeDasharray = `${seg} ${len}`;
    if (reduce) return;
    tr.animate(
      [{ strokeDashoffset: len + seg }, { strokeDashoffset: 0 }],
      { duration: 7000 + i * 1500, iterations: Infinity, easing: 'linear' }
    );
  });
})();
</script>
</body>
</html>
